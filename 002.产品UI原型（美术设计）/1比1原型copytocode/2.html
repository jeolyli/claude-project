<script>
    function switchTab(type) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');

        // Reset error messages when switching
        document.querySelectorAll('[id^="error-"]').forEach(el => el.classList.add('hidden'));

        if (type === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            
            loginTab.classList.add('bg-white', 'shadow-sm', 'text-on-primary-container');
            loginTab.classList.remove('text-on-surface-variant');
            
            registerTab.classList.remove('bg-white', 'shadow-sm', 'text-on-primary-container');
            registerTab.classList.add('text-on-surface-variant');
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            
            registerTab.classList.add('bg-white', 'shadow-sm', 'text-on-primary-container');
            registerTab.classList.remove('text-on-surface-variant');
            
            loginTab.classList.remove('bg-white', 'shadow-sm', 'text-on-primary-container');
            loginTab.classList.add('text-on-surface-variant');
        }
    }

    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('span');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility';
        }
    }

    function showError(id, message) {
        const el = document.getElementById('error-' + id);
        if (el) {
            el.textContent = message;
            el.classList.remove('hidden');
        }
    }

    function handleLogin(e) {
        e.preventDefault();
        let hasError = false;
        
        // Clear previous errors
        document.querySelectorAll('[id^="error-"]').forEach(el => el.classList.add('hidden'));

        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();

        if (!user) {
            showError('loginUser', '请输入用户名');
            hasError = true;
        }
        if (!pass) {
            showError('loginPass', '请输入密码');
            hasError = true;
        }

        if (!hasError) {
            simulateSuccess();
        }
    }

    function handleRegister(e) {
        e.preventDefault();
        let hasError = false;

        document.querySelectorAll('[id^="error-"]').forEach(el => el.classList.add('hidden'));

        const user = document.getElementById('regUser').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value.trim();
        const confirm = document.getElementById('regConfirmPass').value.trim();

        if (!user) { showError('regUser', '请输入用户名'); hasError = true; }
        if (!email) { showError('regEmail', '请输入邮箱'); hasError = true; }
        else if (!email.includes('@')) { showError('regEmail', '请输入有效的邮箱'); hasError = true; }
        
        if (!pass) { showError('regPass', '请输入密码'); hasError = true; }
        else if (pass.length < 8) { showError('regPass', '密码至少需要8位'); hasError = true; }

        if (pass !== confirm) { showError('regConfirmPass', '两次输入的密码不一致'); hasError = true; }

        if (!hasError) {
            simulateSuccess('注册成功！');
        }
    }

    function simulateSuccess(msg = '登录成功！') {
        const toast = document.getElementById('successToast');
        const toastTitle = toast.querySelector('h4');
        toastTitle.textContent = msg;
        
        toast.classList.remove('hidden');
        
        setTimeout(() => {
            const layer = document.getElementById('redirectLayer');
            layer.classList.remove('hidden');
            layer.style.opacity = '0';
            setTimeout(() => { layer.style.opacity = '1'; }, 10);
            
            // Redirect simulation (in real app would be window.location.href)
            setTimeout(() => {
                location.reload(); 
            }, 2500);
        }, 1500);
    }

    // Interactive glow follow
    document.addEventListener('mousemove', (e) => {
        const card = document.querySelector('.group');
        if(!card) return;
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        
        const glow = card.querySelector('.blur-xl');
        if(glow) {
            glow.style.transform = `translate(${x/15}px, ${y/15}px)`;
        }
    });
</script>
</body></html>
