<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF85A2">
  <title>灵记 - 注册</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
  <script src="../js/icons.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React 核心（本地副本，无需外网） -->
  <script src="../js/vendor/react.production.min.js"></script>
  <script src="../js/vendor/react-dom.production.min.js"></script>

  <script>
    const { createElement: h, useState, useEffect, useRef } = React;

    // ===== localStorage 预设分类（与 storage.js 保持一致） =====
    const PRESET_CATEGORIES = [
      { id:'cat_food',          name:'餐饮', icon:'🍽️', color:'#FFAB91', type:'both', sort_order:1, is_preset:true, is_active:true },
      { id:'cat_transport',     name:'交通', icon:'🚌', color:'#9EB7D4', type:'both', sort_order:2, is_preset:true, is_active:true },
      { id:'cat_shopping',      name:'购物', icon:'🛒', color:'#FFB3C6', type:'both', sort_order:3, is_preset:true, is_active:true },
      { id:'cat_housing',       name:'居住', icon:'🏠', color:'#F0D5BE', type:'both', sort_order:4, is_preset:true, is_active:true },
      { id:'cat_entertainment', name:'娱乐', icon:'🎮', color:'#C5A3D9', type:'both', sort_order:5, is_preset:true, is_active:true },
      { id:'cat_medical',       name:'医疗', icon:'💊', color:'#A8D8CA', type:'both', sort_order:6, is_preset:true, is_active:true },
      { id:'cat_education',     name:'教育', icon:'📚', color:'#F9E4B7', type:'both', sort_order:7, is_preset:true, is_active:true },
      { id:'cat_other',         name:'其他', icon:'📦', color:'#D4C5CB', type:'both', sort_order:8, is_preset:true, is_active:true },
    ];

    // ===== API 基础地址 =====
    const API_BASE = window.location.origin + '/api';

    // ===== 注册页面组件 =====
    function RegisterPage() {
      const [username, setUsername]     = useState('');
      const [password, setPassword]     = useState('');
      const [confirmPass, setConfirm]   = useState('');
      const [showPass, setShowPass]     = useState(false);
      const [showConfirm, setShowConfirm] = useState(false);
      const [error, setError]    = useState('');
      const [loading, setLoading] = useState(false);
      const [toast, setToast]    = useState(null);
      const [shake, setShake]    = useState(false);
      const usernameRef = useRef(null);

      // 已登录则跳转首页
      useEffect(() => {
        try {
          const raw = localStorage.getItem('lingji_current_user');
          if (raw) {
            const session = JSON.parse(raw);
            if (Date.now() < new Date(session.expires_at).getTime()) {
              window.location.replace('home.html');
            }
          }
        } catch (_) {}
        usernameRef.current?.focus();
      }, []);

      // 自动清除错误
      useEffect(() => {
        if (!error) return;
        const t = setTimeout(() => setError(''), 4000);
        return () => clearTimeout(t);
      }, [error]);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2200);
      };

      const triggerShake = () => {
        setShake(true);
        setTimeout(() => setShake(false), 300);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        const u = username.trim();

        // --- 客户端校验 ---
        if (!u)                 { setError('请输入用户名'); triggerShake(); return; }
        if (u.length < 2 || u.length > 20) { setError('用户名应为2-20个字符'); triggerShake(); return; }
        if (/^\d+$/.test(u))   { setError('用户名不能为纯数字'); triggerShake(); return; }
        if (!password)          { setError('请输入密码'); triggerShake(); return; }
        if (password.length < 6 || password.length > 20) { setError('密码应为6-20个字符'); triggerShake(); return; }
        if (!/[a-zA-Z]/.test(password)) { setError('密码需包含字母'); triggerShake(); return; }
        if (!/\d/.test(password))       { setError('密码需包含数字'); triggerShake(); return; }
        if (password !== confirmPass)   { setError('两次密码输入不一致'); triggerShake(); return; }

        setLoading(true);
        try {
          const res = await fetch(`${API_BASE}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password }),
          });
          const data = await res.json();

          if (!data.success) {
            setError(data.error || '注册失败');
            triggerShake();
            setLoading(false);
            return;
          }

          // --- 注册成功 → 写 localStorage 桥接原生页面 ---
          const now = new Date().toISOString();
          const session = {
            id: data.user.id,
            username: data.user.username,
            avatar: data.user.avatar || null,
            login_time: now,
            expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(),
          };
          localStorage.setItem('lingji_current_user', JSON.stringify(session));

          // 向后兼容: 同步写入 lingji_users
          try {
            const users = JSON.parse(localStorage.getItem('lingji_users') || '{}');
            users[data.user.id] = {
              id: data.user.id,
              username: data.user.username,
              avatar: null,
              password_hash: '',
              salt: '',
              created_at: now,
              last_login_at: now,
              is_active: true,
            };
            localStorage.setItem('lingji_users', JSON.stringify(users));
          } catch (_) {}

          // 初始化用户数据
          localStorage.setItem(`lingji_data_${data.user.id}`, JSON.stringify({
            transactions: [],
            categories: [...PRESET_CATEGORIES],
            budget: { total_budget: 5000, category_budgets: {} },
            recurringBills: [],
          }));

          showToast('🎉 注册成功！欢迎加入灵记～');
          setTimeout(() => { window.location.href = 'home.html'; }, 800);
        } catch (_) {
          setError('网络错误，请检查后端服务是否启动');
          triggerShake();
          setLoading(false);
        }
      };

      // ===== JSX-free 渲染 =====
      return h('div', { className: 'auth-page' },
        // 背景装饰
        h('div', { className: 'auth-decoration', style: { fontSize: '36px' } }, '🌸'),
        h('div', { className: 'auth-decoration', style: { fontSize: '28px' } }, '💕'),
        h('div', { className: 'auth-decoration', style: { fontSize: '24px' } }, '✨'),

        // 主卡片
        h('div', { className: 'auth-card' },
          h('div', { className: 'auth-mascot animate-heartbeat' }, '🐰'),
          h('h1', { className: 'auth-title' }, '灵记'),
          h('p',  { className: 'auth-subtitle' }, '创建账号，开启记账之旅 ✨'),

          // 错误提示
          h('p', {
            className: 'auth-error' + (error ? ' auth-error--visible' : ''),
          }, error || ' '),

          // 表单
          h('form', {
            className: 'auth-form' + (shake ? ' auth-form--shake' : ''),
            onSubmit: handleSubmit,
          },
            h('div', { className: 'auth-field' },
              h('input', {
                ref: usernameRef,
                className: 'auth-input',
                type: 'text',
                placeholder: '用户名（2-20个字符）',
                maxLength: 20,
                autoComplete: 'username',
                value: username,
                onInput: (e) => setUsername(e.target.value),
              })
            ),
            h('div', { className: 'auth-field', style: { position: 'relative' } },
              h('input', {
                className: 'auth-input',
                type: showPass ? 'text' : 'password',
                placeholder: '密码（6-20个字符，含字母和数字）',
                maxLength: 20,
                autoComplete: 'new-password',
                value: password,
                onInput: (e) => setPassword(e.target.value),
              }),
              h('button', {
                type: 'button',
                className: 'password-toggle',
                onClick: () => setShowPass(!showPass),
              },
                h('span', { className: 'material-symbols-outlined' },
                  showPass ? 'visibility_off' : 'visibility'
                )
              )
            ),
            h('div', { className: 'auth-field', style: { position: 'relative' } },
              h('input', {
                className: 'auth-input',
                type: showConfirm ? 'text' : 'password',
                placeholder: '确认密码',
                maxLength: 20,
                autoComplete: 'new-password',
                value: confirmPass,
                onInput: (e) => setConfirm(e.target.value),
              }),
              h('button', {
                type: 'button',
                className: 'password-toggle',
                onClick: () => setShowConfirm(!showConfirm),
              },
                h('span', { className: 'material-symbols-outlined' },
                  showConfirm ? 'visibility_off' : 'visibility'
                )
              )
            ),
            h('button', {
              type: 'submit',
              className: 'auth-submit',
              disabled: loading,
              style: loading ? { opacity: 0.6, cursor: 'not-allowed' } : {},
            }, loading ? '注册中...' : '注册')
          ),

          // 底部链接
          h('p', { className: 'auth-switch' },
            '已有账号？',
            h('a', { href: 'login.html', className: 'auth-switch-btn' }, '去登录')
          )
        ),

        // Toast
        toast && h('div', { className: 'toast animate-toast-in' }, toast)
      );
    }

    // ===== 挂载 =====
    ReactDOM.createRoot(document.getElementById('root')).render(
      h(RegisterPage)
    );
  </script>
</body>
</html>
