<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF85A2">
  <title>灵记 - 登录</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
  <script src="../js/icons.js"></script>
</head>
<body>
  <div class="auth-page">
    <!-- 背景装饰 -->
    <div class="auth-decoration" style="font-size: 36px;">🌸</div>
    <div class="auth-decoration" style="font-size: 28px;">💕</div>
    <div class="auth-decoration" style="font-size: 24px;">✨</div>

    <!-- 主卡片 -->
    <div class="auth-card">
      <div class="auth-mascot animate-heartbeat">🐰</div>
      <h1 class="auth-title">灵记</h1>
      <p class="auth-subtitle">欢迎回来，今天也要好好记账哦～</p>

      <!-- 错误提示 -->
      <p class="auth-error" id="authError"></p>

      <!-- 登录表单 -->
      <form class="auth-form" id="loginForm">
        <div class="auth-field">
          <input type="text" class="auth-input" id="loginUser" placeholder="用户名" maxlength="20" autocomplete="username" autofocus>
        </div>
        <div class="auth-field">
          <input type="password" class="auth-input" id="loginPass" placeholder="密码" maxlength="20" autocomplete="current-password">
          <button type="button" class="password-toggle" id="togglePassBtn">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
        <button type="submit" class="auth-submit" id="loginSubmit">登录</button>
      </form>

      <!-- 底部链接 -->
      <p class="auth-switch">
        没有账号？
        <a href="register.html" class="auth-switch-btn">立即注册</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { hashPassword } from '../js/crypto.js';
    import {
      findUserByUsername,
      saveUser,
      saveSession,
      isSessionValid,
      isLoginLocked,
      recordLoginFailure,
      resetLoginFailRecord,
    } from '../js/storage.js';

    // 已登录则跳转首页
    if (isSessionValid()) {
      window.location.replace('home.html');
    }

    // 密码可见切换
    document.getElementById('togglePassBtn').addEventListener('click', function () {
      const input = document.getElementById('loginPass');
      const icon = this.querySelector('.material-symbols-outlined');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    });

    // 表单提交
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const errorEl = document.getElementById('authError');
      errorEl.classList.remove('auth-error--visible');

      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;

      // 验证
      if (!username) {
        errorEl.textContent = '请输入用户名';
        errorEl.classList.add('auth-error--visible');
        shake();
        return;
      }
      if (username.length < 2 || username.length > 20) {
        errorEl.textContent = '用户名应为2-20个字符';
        errorEl.classList.add('auth-error--visible');
        shake();
        return;
      }
      if (!password) {
        errorEl.textContent = '请输入密码';
        errorEl.classList.add('auth-error--visible');
        shake();
        return;
      }

      // 锁定检查
      if (isLoginLocked()) {
        errorEl.textContent = '登录尝试次数过多，请15分钟后再试';
        errorEl.classList.add('auth-error--visible');
        shake();
        return;
      }

      // 查找用户
      const found = findUserByUsername(username);
      if (!found) {
        const result = recordLoginFailure();
        errorEl.textContent = result.locked ? `登录尝试次数过多，请${result.remainingMinutes}分钟后再试` : '用户名或密码错误';
        errorEl.classList.add('auth-error--visible');
        shake();
        return;
      }

      // 验证密码
      const hashed = await hashPassword(password, found.salt);
      if (hashed !== found.password_hash) {
        const result = recordLoginFailure();
        errorEl.textContent = result.locked ? `登录尝试次数过多，请${result.remainingMinutes}分钟后再试` : '用户名或密码错误';
        errorEl.classList.add('auth-error--visible');
        shake();
        return;
      }

      // 登录成功
      found.last_login_at = new Date().toISOString();
      saveUser(found);
      saveSession(found);
      resetLoginFailRecord();

      showToast('🎉 登录成功！欢迎回来～');
      setTimeout(() => { window.location.href = 'home.html'; }, 600);
    });

    function shake() {
      const form = document.getElementById('loginForm');
      form.classList.add('auth-form--shake');
      setTimeout(() => form.classList.remove('auth-form--shake'), 300);
    }

    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }
  </script>
</body>
</html>
