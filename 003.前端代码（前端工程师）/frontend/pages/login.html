<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF85A2">
  <style>html,body{background:#FFEEF2;color-scheme:only light}</style>
  <title>灵记 - 登录</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
  <script src="../js/icons.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React 核心（本地副本，无需外网） -->
  <script src="../js/vendor/react.production.min.js"></script>
  <script src="../js/vendor/react-dom.production.min.js"></script>

  <script>
    const { createElement: h, useState, useEffect, useRef } = React;

    // ===== 预设分类（已清空，用户自行创建） =====
    const PRESET_CATEGORIES = [];

    // ===== API 基础地址（Java 后端） =====
    const API_BASE = 'http://localhost:8086/api';

    // ===== 登录页面组件 =====
    function LoginPage() {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [showPass, setShowPass] = useState(false);
      const [error, setError]     = useState('');
      const [loading, setLoading] = useState(false);
      const [toast, setToast]     = useState(null);
      const [shake, setShake]     = useState(false);
      const usernameRef = useRef(null);

      // 已登录则跳转首页
      useEffect(() => {
        try {
          const raw = localStorage.getItem('lingji_current_user');
          if (raw) {
            const session = JSON.parse(raw);
            if (Date.now() < new Date(session.expires_at).getTime()) {
              window.location.replace('home.html');
            }
          }
        } catch (_) {}
        usernameRef.current?.focus();
      }, []);

      // 自动清除错误
      useEffect(() => {
        if (!error) return;
        const t = setTimeout(() => setError(''), 4000);
        return () => clearTimeout(t);
      }, [error]);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2200);
      };

      const triggerShake = () => {
        setShake(true);
        setTimeout(() => setShake(false), 300);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        // 客户端校验
        const u = username.trim();
        if (!u) { setError('请输入用户名'); triggerShake(); return; }
        if (u.length < 2 || u.length > 20) { setError('用户名应为2-20个字符'); triggerShake(); return; }
        if (!password) { setError('请输入密码'); triggerShake(); return; }

        setLoading(true);
        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password }),
          });
          const data = await res.json();

          if (!data.success) {
            setError(data.error || '登录失败');
            triggerShake();
            setLoading(false);
            return;
          }

          // --- 登录成功 → 写 localStorage 桥接原生页面 ---
          const now = new Date().toISOString();
          const session = {
            id: data.user.id,
            username: data.user.username,
            avatar: data.user.avatar || null,
            login_time: now,
            expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(),
          };
          localStorage.setItem('lingji_current_user', JSON.stringify(session));

          // 向后兼容: 同步写入 lingji_users
          try {
            const users = JSON.parse(localStorage.getItem('lingji_users') || '{}');
            users[data.user.id] = {
              id: data.user.id,
              username: data.user.username,
              avatar: data.user.avatar || null,
              password_hash: '',
              salt: '',
              created_at: now,
              last_login_at: now,
              is_active: true,
            };
            localStorage.setItem('lingji_users', JSON.stringify(users));
          } catch (_) {}

          // 如果该用户没有 localStorage 数据，则初始化
          if (!localStorage.getItem(`lingji_data_${data.user.id}`)) {
            localStorage.setItem(`lingji_data_${data.user.id}`, JSON.stringify({
              transactions: [],
              categories: [],
              budget: { total_budget: 5000, category_budgets: {} },
              recurringBills: [],
            }));
          }

          // --- 从后端拉取最新数据（静默，失败不阻塞） ---
          try {
            const syncRes = await fetch(`${API_BASE}/data?userId=${data.user.id}`);
            if (syncRes.ok) {
              const backendData = await syncRes.json();
              if (backendData && (backendData.transactions?.length || backendData.budget)) {
                localStorage.setItem(`lingji_data_${data.user.id}`, JSON.stringify(backendData));
                console.log('[sync] 已从后端拉取数据:', backendData.transactions?.length || 0, '条流水');
              }
            }
          } catch (_) { /* 静默降级 */ }

          showToast('🎉 登录成功！欢迎回来～');
          setTimeout(() => { window.location.href = 'home.html'; }, 600);
        } catch (_) {
          setError('网络错误，请检查后端服务是否启动');
          triggerShake();
          setLoading(false);
        }
      };

      // ===== JSX-free 渲染 =====
      return h('div', { className: 'auth-page' },
        // 背景装饰
        h('div', { className: 'auth-decoration', style: { fontSize: '36px' } }, '🌸'),
        h('div', { className: 'auth-decoration', style: { fontSize: '28px' } }, '💕'),
        h('div', { className: 'auth-decoration', style: { fontSize: '24px' } }, '✨'),

        // 主卡片
        h('div', { className: 'auth-card' },
          h('div', { className: 'auth-mascot animate-heartbeat' }, '🐰'),
          h('h1', { className: 'auth-title' }, '灵记'),
          h('p',  { className: 'auth-subtitle' }, '欢迎回来，今天也要好好记账哦～'),

          // 错误提示
          h('p', {
            className: 'auth-error' + (error ? ' auth-error--visible' : ''),
          }, error || ' '),

          // 表单
          h('form', {
            className: 'auth-form' + (shake ? ' auth-form--shake' : ''),
            onSubmit: handleSubmit,
          },
            h('div', { className: 'auth-field' },
              h('input', {
                ref: usernameRef,
                className: 'auth-input',
                type: 'text',
                placeholder: '用户名',
                maxLength: 20,
                autoComplete: 'username',
                value: username,
                onInput: (e) => setUsername(e.target.value),
              })
            ),
            h('div', { className: 'auth-field', style: { position: 'relative' } },
              h('input', {
                className: 'auth-input',
                type: showPass ? 'text' : 'password',
                placeholder: '密码',
                maxLength: 20,
                autoComplete: 'current-password',
                value: password,
                onInput: (e) => setPassword(e.target.value),
              }),
              h('button', {
                type: 'button',
                className: 'password-toggle',
                onClick: () => setShowPass(!showPass),
              },
                h('span', { className: 'material-symbols-outlined' },
                  showPass ? 'visibility_off' : 'visibility'
                )
              )
            ),
            h('button', {
              type: 'submit',
              className: 'auth-submit',
              disabled: loading,
              style: loading ? { opacity: 0.6, cursor: 'not-allowed' } : {},
            }, loading ? '登录中...' : '登录')
          ),

          // 底部链接
          h('p', { className: 'auth-switch' },
            '没有账号？',
            h('a', { href: 'register.html', className: 'auth-switch-btn' }, '立即注册')
          )
        ),

        // Toast
        toast && h('div', { className: 'toast animate-toast-in' }, toast)
      );
    }

    // ===== 挂载 =====
    ReactDOM.createRoot(document.getElementById('root')).render(
      h(LoginPage)
    );
  </script>
</body>
</html>
