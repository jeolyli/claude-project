<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF85A2">
  <title>灵记 - 数据管理</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/data.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-left">
        <a href="profile.html" style="display:flex;align-items:center;color:var(--color-neutral-700);text-decoration:none;margin-right:4px;">
          <span class="material-symbols-outlined" style="font-size:22px;">arrow_back_ios</span>
        </a>
        <span class="header-mascot">🐰</span>
        <h1 class="header-title">数据管理</h1>
      </div>
      <div class="header-right" id="headerRight"></div>
    </header>

    <main class="main-content data-page">
      <!-- 数据概览 -->
      <div class="data-card">
        <h3 class="data-card-title">
          <span class="material-symbols-outlined" style="color:var(--color-primary-400);">analytics</span>
          数据概览
        </h3>
        <div class="data-stats">
          <div class="data-stat">
            <div class="data-stat-value" id="statTxCount">0</div>
            <div class="data-stat-label">总记录数</div>
          </div>
          <div class="data-stat">
            <div class="data-stat-value" id="statCatCount">0</div>
            <div class="data-stat-label">分类数</div>
          </div>
          <div class="data-stat">
            <div class="data-stat-value" id="statFirstDate">—</div>
            <div class="data-stat-label">最早记录</div>
          </div>
        </div>
      </div>

      <!-- 导出 -->
      <div class="data-card">
        <h3 class="data-card-title">
          <span class="material-symbols-outlined" style="color:var(--color-primary-400);">file_export</span>
          导出数据
        </h3>
        <p class="data-card-desc">将流水记录导出为文件，方便在电脑上查看或分享</p>
        <button class="data-btn data-btn--primary" id="exportCsvBtn">
          <span class="material-symbols-outlined">table</span>
          导出为 CSV
        </button>
      </div>

      <!-- 备份与恢复 -->
      <div class="data-card">
        <h3 class="data-card-title">
          <span class="material-symbols-outlined" style="color:var(--color-primary-400);">cloud_sync</span>
          备份与恢复
        </h3>
        <p class="data-card-desc">完整备份包含所有流水记录、分类和预算设置。恢复将覆盖当前数据。</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button class="data-btn" id="backupBtn">
            <span class="material-symbols-outlined">download</span>
            备份数据（JSON）
          </button>
          <button class="data-btn data-btn--outline" id="restoreBtn">
            <span class="material-symbols-outlined">upload</span>
            从备份恢复
          </button>
          <input type="file" id="restoreFileInput" accept=".json" style="display:none;">
        </div>
      </div>

      <!-- 清除数据 -->
      <div class="data-card">
        <h3 class="data-card-title">
          <span class="material-symbols-outlined" style="color:var(--color-accent-coral);">delete_forever</span>
          清除数据
        </h3>
        <p class="data-card-desc">清除所有流水记录，分类和预算保留。此操作不可撤销。</p>
        <button class="data-btn data-btn--danger" id="clearDataBtn">
          <span class="material-symbols-outlined">warning</span>
          清除所有流水记录
        </button>
      </div>

      <div class="bottom-spacer"></div>
    </main>
  </div>

  <script type="module" src="../js/data.js"></script>
</body>
</html>
