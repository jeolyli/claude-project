<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF85A2">
  <style>html,body{background:#FFEEF2;color-scheme:only light}</style>
  <link rel="prefetch" href="home.html"><link rel="prefetch" href="bills.html"><link rel="prefetch" href="stats.html"><link rel="prefetch" href="profile.html">
  <script type="speculationrules">{"prerender":[{"source":"document","where":{"href_matches":"/pages/*"}}]}</script>
  <title>灵记 - 隐私设置</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/privacy.css">
  <script src="../js/icons.js"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-left">
        <a href="profile.html" style="display:flex;align-items:center;color:var(--color-neutral-700);text-decoration:none;margin-right:4px;">
          <span class="material-symbols-outlined" style="font-size:22px;">arrow_back_ios</span>
        </a>
        <span class="header-mascot">🐰</span>
        <h1 class="header-title">隐私设置</h1>
      </div>
      <div class="header-right" id="headerRight"></div>
    </header>

    <main class="main-content privacy-page">
      <!-- 修改密码 -->
      <div class="privacy-card">
        <h3 class="privacy-card-title">
          <span class="material-symbols-outlined" style="color:var(--color-primary-400);">lock</span>
          修改密码
        </h3>
        <p class="privacy-card-desc">建议使用字母+数字组合，6-20个字符</p>

        <div id="changePasswordForm">
          <div class="privacy-field">
            <label class="privacy-label">当前密码</label>
            <div class="privacy-input-wrap">
              <input type="password" class="privacy-input" id="oldPass" placeholder="输入当前密码" maxlength="20" autocomplete="current-password">
              <button type="button" class="password-toggle" id="toggleOld">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>

          <div class="privacy-field">
            <label class="privacy-label">新密码</label>
            <div class="privacy-input-wrap">
              <input type="password" class="privacy-input" id="newPass" placeholder="输入新密码" maxlength="20" autocomplete="new-password">
              <button type="button" class="password-toggle" id="toggleNew">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>

          <div class="privacy-field">
            <label class="privacy-label">确认新密码</label>
            <div class="privacy-input-wrap">
              <input type="password" class="privacy-input" id="confirmNewPass" placeholder="再次输入新密码" maxlength="20" autocomplete="new-password">
              <button type="button" class="password-toggle" id="toggleConfirm">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>

          <p class="privacy-error" id="changePwdError" style="display:none;"></p>
          <p class="privacy-success" id="changePwdSuccess" style="display:none;"></p>

          <button class="privacy-save-btn" id="changePwdBtn">更新密码</button>
        </div>
      </div>

      <!-- 安全提示 -->
      <div class="privacy-info">
        <span class="material-symbols-outlined privacy-info-icon" style="font-size:18px;">info</span>
        <div>
          <strong>安全说明</strong><br>
          你的密码使用 SHA-256 + 加盐哈希存储，灵记不会以明文形式保存你的密码。所有财务数据仅存储在你的浏览器本地，不会上传到任何服务器。
        </div>
      </div>

      <div class="bottom-spacer"></div>
    </main>
  </div>

  <script type="module" src="../js/privacy.js"></script>
</body>
</html>
