<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF85A2">
  <style>html,body{background:#FFEEF2;color-scheme:only light}</style>
  <link rel="prefetch" href="home.html"><link rel="prefetch" href="bills.html"><link rel="prefetch" href="stats.html"><link rel="prefetch" href="profile.html">
  <script type="speculationrules">{"prerender":[{"source":"document","where":{"href_matches":"/pages/*"}}]}</script>
  <title>灵记 - 统计</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/stats.css">
  <script src="../js/icons.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- 顶部导航 -->
    <header class="app-header">
      <div class="header-left">
        <span class="header-mascot">🐰</span>
        <h1 class="header-title">收支统计</h1>
      </div>
      <div class="header-right" id="headerRight"></div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content stats-page">
      <!-- 页面描述 -->
      <div class="stats-header">
        <p class="stats-header-desc">来看看最近的财务状况吧，灵灵觉得你表现得很棒哦！✨</p>
      </div>

      <!-- 时间切换 -->
      <div class="stats-time-toggle">
        <button class="stats-time-btn stats-time-btn--active" data-period="week">本周</button>
        <button class="stats-time-btn" data-period="month">本月</button>
      </div>

      <!-- 汇总卡片 -->
      <div class="stats-summary">
        <div class="stats-summary-card">
          <div class="stats-summary-icon stats-summary-icon--income">
            <span class="material-symbols-outlined">account_balance_wallet</span>
          </div>
          <div class="stats-summary-info">
            <span class="stats-summary-label">总收入</span>
            <span class="stats-summary-value" id="statIncome">¥0.00</span>
          </div>
        </div>
        <div class="stats-summary-card">
          <div class="stats-summary-icon stats-summary-icon--expense">
            <span class="material-symbols-outlined">receipt_long</span>
          </div>
          <div class="stats-summary-info">
            <span class="stats-summary-label">总支出</span>
            <span class="stats-summary-value" id="statExpense">¥0.00</span>
          </div>
        </div>
        <!-- 灵灵消息 -->
        <div class="stats-mascot-card">
          <span class="stats-mascot-img">🐰</span>
          <div class="stats-mascot-text">
            <span class="stats-mascot-title">灵灵为你感到骄傲！</span>
            <span class="stats-mascot-desc" id="mascotDesc">回顾一天的支出是很好的睡前习惯。晚安！🌙</span>
          </div>
        </div>
      </div>

      <!-- 图表区 -->
      <div class="stats-chart-section">
        <!-- 趋势折线图 -->
        <div class="stats-chart-card">
          <h3 class="stats-chart-title">消费趋势</h3>
          <div class="stats-chart-wrapper">
            <canvas id="lineChart"></canvas>
          </div>
        </div>
        <!-- 分类饼图 -->
        <div class="stats-chart-card">
          <h3 class="stats-chart-title">分类占比</h3>
          <div class="stats-chart-wrapper">
            <canvas id="pieChart"></canvas>
          </div>
        </div>
      </div>

      <div class="bottom-spacer"></div>
    </main>

    <!-- 底部导航栏 -->
    <nav class="tab-bar" id="tabBar"></nav>
  </div>

  <script type="module" src="../js/stats.js"></script>
  <script type="module">
    import { renderHeaderUser } from '../js/app.js';
    renderHeaderUser('#headerRight');
  </script>
</body>
</html>
