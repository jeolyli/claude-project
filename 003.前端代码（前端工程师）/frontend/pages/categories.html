<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF85A2">
  <title>灵记 - 分类管理</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/categories.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- 顶部导航 -->
    <header class="app-header">
      <div class="header-left">
        <a href="profile.html" class="header-back" style="display:flex;align-items:center;color:var(--color-neutral-700);text-decoration:none;margin-right:4px;">
          <span class="material-symbols-outlined" style="font-size:22px;">arrow_back_ios</span>
        </a>
        <span class="header-mascot">🐰</span>
        <h1 class="header-title">分类管理</h1>
      </div>
      <div class="header-right" id="headerRight"></div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content categories-page">
      <!-- 类型切换 -->
      <div class="cat-tabs">
        <button class="cat-tab cat-tab--active" data-type="expense">
          <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;">trending_down</span>
          支出分类
        </button>
        <button class="cat-tab" data-type="income">
          <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;">trending_up</span>
          收入分类
        </button>
      </div>

      <!-- 分类列表 -->
      <div class="cat-list" id="categoryList"></div>

      <!-- 添加按钮 -->
      <button class="cat-add-btn" id="addCategoryBtn">
        <span class="material-symbols-outlined" style="font-size:20px;">add</span>
        添加分类
      </button>

      <div class="bottom-spacer"></div>
    </main>
  </div>

  <script type="module" src="../js/categories.js"></script>
  <script type="module">
    import { renderHeaderUser } from '../js/app.js';
    renderHeaderUser('#headerRight');
  </script>
</body>
</html>
