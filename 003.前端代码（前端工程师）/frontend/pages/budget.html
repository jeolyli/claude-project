<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF85A2">
  <title>灵记 - 预算设置</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/budget.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- 顶部导航 -->
    <header class="app-header">
      <div class="header-left">
        <a href="profile.html" style="display:flex;align-items:center;color:var(--color-neutral-700);text-decoration:none;margin-right:4px;">
          <span class="material-symbols-outlined" style="font-size:22px;">arrow_back_ios</span>
        </a>
        <span class="header-mascot">🐰</span>
        <h1 class="header-title">预算设置</h1>
      </div>
      <div class="header-right" id="headerRight"></div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content budget-page">
      <p class="budget-hint">设置本月总预算和各分类预算，帮你更好控制开支 💪</p>

      <!-- 总预算 -->
      <div class="budget-total-card">
        <div class="budget-total-label">月度总预算</div>
        <div class="budget-total-input-wrapper">
          <span class="budget-total-currency">¥</span>
          <input type="number" class="budget-total-input" id="totalBudgetInput" placeholder="5000" min="1" max="99999999" step="1">
        </div>
        <div class="budget-total-hint">设置每月可支出的总金额</div>
      </div>

      <!-- 分类预算 -->
      <div class="budget-cat-section">
        <h3 class="budget-cat-title">
          <span class="material-symbols-outlined" style="font-size:20px;color:var(--color-primary-400);">category</span>
          分类预算（选填）
        </h3>
        <p class="budget-cat-desc">为每个支出分类设置单独的预算额度</p>
        <div class="budget-cat-list" id="categoryBudgetList"></div>

        <!-- 分类合计 -->
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0 4px;border-top:1px dashed var(--color-neutral-200);margin-top:8px;">
          <span style="font-size:13px;color:var(--color-neutral-400);">分类合计</span>
          <span id="categorySum" style="font-size:16px;font-weight:600;color:var(--color-neutral-900);">¥0</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px;">
          <span style="font-size:12px;color:var(--color-neutral-400);" id="budgetDiffHint">剩余可分配</span>
          <span id="budgetDiff" style="font-size:14px;font-weight:600;color:var(--color-accent-mint);">—</span>
        </div>
        <button class="profile-action-btn profile-action--switch" id="clearDefaultBtn" style="font-size:13px;padding:8px;margin-bottom:4px;">
          清空所有分类预算
        </button>
      </div>

      <!-- 保存按钮 -->
      <button class="budget-save-btn" id="saveBudgetBtn">💾 保存预算</button>

      <div class="bottom-spacer"></div>
    </main>
  </div>

  <script type="module" src="../js/budget.js"></script>
</body>
</html>
