  <text x="60" y="80" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#FF6B35" font-weight="bold">TEAM</text>
  <text x="60" y="130" font-family="Noto Sans SC, sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF">创始团队</text>

  <!-- Team members -->
  <g transform="translate(290, 200)">
    <rect width="280" height="200" rx="12" fill="#152538" stroke="#FF6B35" stroke-width="1"/>
    <text x="140" y="50" font-family="sans-serif" font-size="48" text-anchor="middle">👨‍💻</text>
    <text x="140" y="120" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">CEO</text>
    <text x="140" y="155" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6" text-anchor="middle">产品负责人</text>
    <text x="140" y="175" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6" text-anchor="middle">10年经验</text>
  </g>
  <g transform="translate(710, 200)">
    <rect width="280" height="200" rx="12" fill="#152538" stroke="#FF6B35" stroke-width="1"/>
    <text x="140" y="50" font-family="sans-serif" font-size="48" text-anchor="middle">👩‍💼</text>
    <text x="140" y="120" font-family="Noto Sans SC, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">CTO</text>
    <text x="140" y="155" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6" text-anchor="middle">技术负责人</text>
    <text x="140" y="175" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6" text-anchor="middle">全栈开发</text>
