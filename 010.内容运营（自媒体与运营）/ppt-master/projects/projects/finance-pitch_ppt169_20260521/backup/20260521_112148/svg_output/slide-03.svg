<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Section title -->
  <text x="60" y="80" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#00FF88" font-weight="bold">SOLUTION</text>
  <text x="60" y="130" font-family="Noto Sans SC, sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF">财务管家的力量</text>

  <!-- Solution steps -->
  <g transform="translate(60, 180)">
    <rect width="1160" height="130" rx="12" fill="#0A1A0F" stroke="#00FF88" stroke-width="1"/>
    <circle cx="50" cy="65" r="30" fill="#00FF88"/>
    <text x="50" y="75" font-family="sans-serif" font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">1</text>
    <text x="120" y="55" font-family="Noto Sans SC, sans-serif" font-size="22" font-weight="bold" fill="#00FF88">3秒极速记账</text>
    <text x="120" y="90" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6">极简流程，一键完成，就是这么快</text>
  </g>

  <g transform="translate(60, 330)">
    <rect width="1160" height="130" rx="12" fill="#0A1A0F" stroke="#00FF88" stroke-width="1"/>
    <circle cx="50" cy="65" r="30" fill="#00FF88"/>
    <text x="50" y="75" font-family="sans-serif" font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">2</text>
    <text x="120" y="55" font-family="Noto Sans SC, sans-serif" font-size="22" font-weight="bold" fill="#00FF88">智能财务报表</text>
    <text x="120" y="90" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6">收支分类图表，一目了然</text>
  </g>

  <g transform="translate(60, 480)">
    <rect width="1160" height="130" rx="12" fill="#0A1A0F" stroke="#00FF88" stroke-width="1"/>
    <circle cx="50" cy="65" r="30" fill="#00FF88"/>
    <text x="50" y="75" font-family="sans-serif" font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">3</text>
    <text x="120" y="55" font-family="Noto Sans SC, sans-serif" font-size="22" font-weight="bold" fill="#00FF88">Excel数据导出</text>
    <text x="120" y="90" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6">随时导出，数据掌控在自己手中</text>
  </g>

  <!-- Page number -->
  <text x="640" y="690" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">3 / 5</text>
</svg>