<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGrad)"/>

  <!-- Company name -->
  <text x="640" y="280" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">财务管家</text>

  <!-- Tagline -->
  <text x="640" y="350" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#B8C5D6" text-anchor="middle">让每一笔收支都有迹可循</text>

  <!-- Stats row -->
  <g transform="translate(190, 420)">
    <rect width="260" height="120" rx="12" fill="#152538" stroke="#1E3A5F" stroke-width="1"/>
    <text x="130" y="55" font-family="sans-serif" font-size="36" font-weight="bold" fill="#00D4FF" text-anchor="middle" filter="url(#glow)">3秒</text>
    <text x="130" y="90" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6" text-anchor="middle">极速记账</text>
  </g>
  <g transform="translate(510, 420)">
    <rect width="260" height="120" rx="12" fill="#152538" stroke="#00FF88" stroke-width="1"/>
    <text x="130" y="55" font-family="sans-serif" font-size="36" font-weight="bold" fill="#00FF88" text-anchor="middle">100%</text>
    <text x="130" y="90" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6" text-anchor="middle">数据安全</text>
  </g>
  <g transform="translate(830, 420)">
    <rect width="260" height="120" rx="12" fill="#152538" stroke="#FF6B35" stroke-width="1"/>
    <text x="130" y="55" font-family="sans-serif" font-size="36" font-weight="bold" fill="#FF6B35" text-anchor="middle">免费</text>
    <text x="130" y="90" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#B8C5D6" text-anchor="middle">零门槛</text>
  </g>

  <!-- Funding info -->
  <text x="640" y="600" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#00D4FF" text-anchor="middle" font-weight="bold">A轮融资  |  1000万人民币  |  出让10%股份</text>

  <!-- Page number -->
  <text x="640" y="690" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">1 / 5</text>
</svg>