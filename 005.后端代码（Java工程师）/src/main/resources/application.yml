server:
  port: 8086

spring:
  application:
    name: lingji-finance
  # ======================== 数据源配置 ========================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:8806/lingji?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root_123456
    # HikariCP 连接池
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

# ======================== MyBatis-Plus ========================
mybatis-plus:
  # 实体类扫描
  type-aliases-package: com.lingji.finance.entity
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    # 下划线转驼峰（默认开启）
    map-underscore-to-camel-case: true
    # 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键类型：ASSIGN_ID（雪花算法）
      id-type: ASSIGN_ID
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ======================== 日志 ========================
logging:
  level:
    com.lingji.finance: debug
    root: info
